name: CI

# Build/test/lint gate for PRs and main. The deploy workflow (deploy.yml) only runs on
# main and publishes the gallery + registry; this is the freshness/correctness gate that
# runs BEFORE merge.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # tsc -b + vite build (typecheck is part of build).
      - run: pnpm build

      # Typecheck the test sources too. `pnpm build` only covers the app/node tsconfigs;
      # `pnpm test` (vitest) strips types without checking them, so without this a test-only
      # type error would slip through CI.
      - run: pnpm typecheck:test

      - run: pnpm test

      # Registry-drift guard: registry.json must be in lock-step with the component source.
      # Regenerate it and fail if anything changed (i.e. someone edited a component's imports
      # without running `pnpm gen:registry`).
      - name: Registry drift guard
        run: |
          pnpm gen:registry
          git diff --exit-code registry.json \
            || (echo "::error::registry.json is stale — run 'pnpm gen:registry' and commit the result." && exit 1)

      # Barrel-drift guard: src/index.ts (the npm-package entry) must list every component.
      # Regenerate it and fail if it changed (someone added a component without running
      # `pnpm gen:barrel`).
      - name: Barrel drift guard
        run: |
          pnpm gen:barrel
          git diff --exit-code src/index.ts \
            || (echo "::error::src/index.ts is stale — run 'pnpm gen:barrel' and commit the result." && exit 1)

      # Smoke-test that the installable registry builds (shadcn build + URL rewrite).
      # Runs after `pnpm build` because it emits into dist/ (which vite cleans).
      - run: pnpm build:registry

      # Build the npm package (barrel → ESM + types + prebuilt CSS into dist-lib/) AND validate
      # it: publint (package.json/exports correctness) + are-the-types-wrong (types resolve under
      # node16/nodenext/bundler). Guards the published surface the way the registry/barrel guards
      # above protect the owned-source surface. dist-lib/ is separate from the gallery's dist/.
      - run: pnpm check:pkg

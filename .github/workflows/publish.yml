name: Publish to npm

# Publishes the @bbatchelder/mithril package when a version tag is pushed. The release flow:
#   1. bump "version" in package.json (and commit on main)
#   2. git tag vX.Y.Z && git push --tags
# This workflow then verifies the tag matches package.json, builds the package, and publishes
# with npm provenance. It is independent of deploy.yml (the GitHub Pages gallery + registry),
# which keeps running on every push to main.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# id-token: write is required for npm provenance (--provenance) via OIDC.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      # Guard: the pushed tag (vX.Y.Z) must match package.json "version". Skipped for manual
      # workflow_dispatch runs (no tag ref).
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION."
            exit 1
          fi

      # Build the package (ESM + types + prebuilt CSS) into dist-lib/ AND validate it
      # (publint + are-the-types-wrong) — a last gate before the artifact goes public.
      - run: pnpm check:pkg

      # npm (not pnpm) for publish so --provenance attestation is generated. publishConfig in
      # package.json sets public access; the token is a repo secret.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
